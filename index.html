<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three Capital Partners — Meeting Room Display</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0F1E3D;
    overflow: hidden;
  }
  .stage {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
  }
  .logo {
    max-width: 46vw;
    min-width: 260px;
  }
  .divider {
    width: 22vw;
    max-width: 320px;
    height: 3px;
    background: #C9A961;
  }
  .date, .time {
    font-family: Calibri, 'Segoe UI', Arial, sans-serif;
    font-weight: bold;
    color: #FFFFFF;
    letter-spacing: 2px;
    text-align: center;
    margin: 0;
  }
  .date {
    font-size: clamp(18px, 2.6vw, 32px);
  }
  .time {
    font-size: clamp(18px, 2.6vw, 32px);
  }
</style>
</head>
<body>
  <div class="stage">
    <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABoAAAAECCAYAAADehBXvAAAACXBIWXMAAAsTAAALEwEAmpwYAAAKT2lDQ1BQaG90b3Nob3AgSUNDIHByb2ZpbGUAAHjanVNnVFPpFj333vRCS4iAlEtvUhUIIFJCi4A[...]"
    <div class="divider"></div>
    <p class="date" id="dateLine"></p>
    <p class="time" id="timeLine"></p>
  </div>

  <script>
    function pad(n) { return n.toString().padStart(2, '0'); }

    function updateClock() {
      const now = new Date();
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dateStr = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
      const timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes());
      document.getElementById('dateLine').textContent = dateStr;
      document.getElementById('timeLine').textContent = timeStr;
    }

    updateClock();
    // update once a minute since seconds are not shown
    setInterval(updateClock, 60000);
  </script>
</body>
</html>
